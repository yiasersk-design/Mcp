    <script>

    <script>
        // ==========================================
        // Auth & Google Drive Settings
        // ==========================================
        const CLIENT_ID = '80116814697-fmqidduq28ubj101ff5fnmcsk2oevt53.apps.googleusercontent.com'; // আপনার Client ID বসান
        let tokenClient; 
        let accessToken = null;

        window.onload = function () {
            loadHighScore();
            
            const savedUser = localStorage.getItem('snakeGameUser');
            
            // ১. লগইন সিস্টেম (Google Identity Services)
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                showGameScreen(userData, false);
            } else {
                google.accounts.id.initialize({
                    client_id: CLIENT_ID,
                    callback: handleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.getElementById("buttonDiv"),
                    { theme: "filled_black", size: "large", shape: "pill", width: "280" } 
                );
            }

            // ২. Google Drive এর জন্য Token Client সেটআপ
            // এটি ব্যবহারকারীকে তার ড্রাইভে ফাইল সেভ করার পারমিশন চাইবে
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/drive.file',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        generateAndUploadPDF(); // পারমিশন পেলে পিডিএফ আপলোড করবে
                    }
                },
            });
        };

        // ==========================================
        // Google Drive PDF Generation & Upload
        // ==========================================

        // ড্রাইভ বাটন ক্লিক করলে এই ফাংশন কল হবে
        function requestDriveAccessAndSave() {
            const btn = document.getElementById('drive-btn');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin text-xl"></i> <span>প্রস্তুত করা হচ্ছে...</span>`;
            btn.disabled = true;

            // যদি আগে থেকে এক্সেস টোকেন না থাকে, তাহলে গুগল পপআপ ওপেন করে পারমিশন চাইবে
            if (!accessToken) {
                tokenClient.requestAccessToken();
            } else {
                generateAndUploadPDF();
            }
        }

        async function generateAndUploadPDF() {
            try {
                const userData = JSON.parse(localStorage.getItem('snakeGameUser'));
                const playerName = userData ? userData.name : 'Player';
                
                // ১. jsPDF দিয়ে সার্টিফিকেট তৈরি করা
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                
                // ব্যাকগ্রাউন্ড ডিজাইন
                doc.setFillColor(15, 23, 42); // Dark Slate
                doc.rect(0, 0, 297, 210, 'F');
                
                // বর্ডার
                doc.setDrawColor(0, 255, 136); // Neon Green
                doc.setLineWidth(2);
                doc.rect(10, 10, 277, 190);

                // টেক্সট
                doc.setTextColor(0, 255, 136);
                doc.setFontSize(40);
                doc.text("SNAKE X", 148, 50, { align: 'center' });
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(24);
                doc.text("Certificate of Participation", 148, 80, { align: 'center' });

                doc.setFontSize(18);
                doc.text(`Thank you ${playerName} for joining the game!`, 148, 120, { align: 'center' });
                
                doc.setTextColor(250, 204, 21); // Yellow
                doc.setFontSize(22);
                doc.text(`Final Score: ${score}`, 148, 150, { align: 'center' });

                // পিডিএফ ফাইলটিকে Blob-এ কনভার্ট করা
                const pdfBlob = doc.output('blob');

                // ২. Google Drive-এ আপলোড করা
                const metadata = {
                    name: `Snake_Game_Certificate_${Date.now()}.pdf`,
                    mimeType: 'application/pdf'
                };

                const formData = new FormData();
                formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                formData.append('file', pdfBlob);

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: formData
                });

                const data = await response.json();
                
                // সাকসেস মেসেজ
                const btn = document.getElementById('drive-btn');
                if (data.id) {
                    btn.className = "mb-4 bg-green-500 text-slate-900 font-bold py-3 px-6 rounded-xl flex items-center gap-2 text-sm";
                    btn.innerHTML = `<i class="ph ph-check-circle text-xl"></i> <span>ড্রাইভে সেভ হয়েছে!</span>`;
                } else {
                    throw new Error("Upload failed");
                }

            } catch (error) {
                console.error('Error saving to Drive:', error);
                const btn = document.getElementById('drive-btn');
                btn.className = "mb-4 bg-red-500 text-white font-bold py-3 px-6 rounded-xl flex items-center gap-2 text-sm";
                btn.innerHTML = `<i class="ph ph-x-circle text-xl"></i> <span>সেভ করতে সমস্যা হয়েছে</span>`;
                btn.disabled = false;
            }
        }

        // ==========================================
        // Login Processing
        // ==========================================

        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const responsePayload = decodeJwtResponse(response.credential);
            let picUrl = responsePayload.picture.replace('=s96-c', '=s400-c');

            const userData = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: picUrl
            };

            localStorage.setItem('snakeGameUser', JSON.stringify(userData));
            showGameScreen(userData, true);
        }

        function showGameScreen(userData, animate) {
            document.getElementById('user-name').textContent = userData.name;
            document.getElementById('user-email').textContent = userData.email;
            document.getElementById('user-pic').src = userData.picture;

            const loginSec = document.getElementById('login-section');
            const gameSec = document.getElementById('game-section');

            if (animate) {
                loginSec.style.opacity = '0';
                loginSec.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    loginSec.classList.add('hidden');
                    gameSec.classList.remove('hidden');
                    gameSec.classList.add('flex');
                    gameSec.style.opacity = '0';
                    setTimeout(() => {
                        gameSec.style.transition = 'opacity 0.5s ease';
                        gameSec.style.opacity = '1';
                    }, 50);
                    resetGame();
                }, 300);
            } else {
                loginSec.classList.add('hidden');
                gameSec.classList.remove('hidden');
                gameSec.classList.add('flex');
                gameSec.style.opacity = '1';
                resetGame();
            }
        }

        function signOut() {
            localStorage.removeItem('snakeGameUser');
            accessToken = null; // টোকেন মুছে ফেলা হলো
            location.reload();
        }

        // ==========================================
        // Snake Game Logic
        // ==========================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');

        let snake = [];
        let food = {};
        let dx = 0, dy = 0;
        let score = 0, highScore = 0;
        let gameLoopTimeout;
        let changingDirection = false;
        let isGameOver = false;

        const gridSize = 20; 
        const tileCount = canvas.width / gridSize;

        function loadHighScore() {
            highScore = localStorage.getItem('snakePremiumHighScore') || 0;
            highScoreDisplay.textContent = highScore;
        }

        function saveHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakePremiumHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }, { x: 10, y: 11 }, { x: 10, y: 12 }];
            dx = 0; dy = -1;
            score = 0; scoreDisplay.textContent = score;
            isGameOver = false;
            
            // রিসেট ড্রাইভ বাটন UI
            const driveBtn = document.getElementById('drive-btn');
            driveBtn.className = "mb-4 bg-white hover:bg-gray-200 text-black font-bold py-3 px-6 rounded-xl shadow-lg transition transform hover:-translate-y-1 flex items-center gap-2 text-sm";
            driveBtn.innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" class="w-5 h-5" alt="Drive"> <span>Google Drive-এ সার্টিফিকেট সেভ করুন</span>`;
            driveBtn.disabled = false;

            gameOverScreen.classList.add('hidden');
            gameOverScreen.classList.remove('flex');
            
            spawnFood();
            clearTimeout(gameLoopTimeout);
            main();
        }

        function main() {
            if (hasGameEnded()) {
                isGameOver = true;
                finalScoreDisplay.textContent = score;
                saveHighScore();
                gameOverScreen.classList.remove('hidden');
                gameOverScreen.classList.add('flex');
                return;
            }

            changingDirection = false;
            gameLoopTimeout = setTimeout(function onTick() {
                clearCanvas();
                drawGrid();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 90); 
        }

        function clearCanvas() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            for(let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        CanvasRenderingContext2D.prototype.roundRect = CanvasRenderingContext2D.prototype.roundRect || function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
            this.beginPath(); this.moveTo(x+r, y); this.arcTo(x+w, y, x+w, y+h, r);
            this.arcTo(x+w, y+h, x, y+h, r); this.arcTo(x, y+h, x, y, r); this.arcTo(x, y, x+w, y, r);
            this.closePath(); return this;
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.shadowBlur = isHead ? 20 : 5;
                ctx.shadowColor = '#00ff88';
                
                if (isHead) {
                    let grad = ctx.createLinearGradient(part.x * gridSize, part.y * gridSize, (part.x+1) * gridSize, (part.y+1) * gridSize);
                    grad.addColorStop(0, '#00ff88'); grad.addColorStop(1, '#00b8ff');
                    ctx.fillStyle = grad;
                } else {
                    ctx.fillStyle = `rgba(0, 255, 136, ${1 - (index/snake.length)*0.6})`; 
                }
                
                ctx.roundRect(part.x * gridSize + 1.5, part.y * gridSize + 1.5, gridSize - 3, gridSize - 3, isHead ? 6 : 4);
                ctx.fill(); ctx.shadowBlur = 0;
            });
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); 
            if (head.x === food.x && head.y === food.y) {
                score += 10; scoreDisplay.textContent = score;
                spawnFood();
            } else {
                snake.pop(); 
            }
        }

        function drawFood() {
            ctx.shadowBlur = 15; ctx.shadowColor = '#f43f5e'; 
            let grad = ctx.createRadialGradient(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, 2, food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2);
            grad.addColorStop(0, '#fda4af'); grad.addColorStop(1, '#e11d48');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, 2 * Math.PI);
            ctx.fill(); ctx.shadowBlur = 0; 
        }

        function spawnFood() {
            food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            snake.forEach(function isFoodOnSnake(part) { if (part.x === food.x && part.y === food.y) spawnFood(); });
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount;
        }

        function changeDirection(event) {
            if (changingDirection || isGameOver) return;
            const key = event.keyCode;
            const goingUp = dy === -1, goingDown = dy === 1, goingRight = dx === 1, goingLeft = dx === -1;

            if ((key === 37 || key === 65) && !goingRight) { dx = -1; dy = 0; changingDirection = true; }
            if ((key === 38 || key === 87) && !goingDown) { dx = 0; dy = -1; changingDirection = true; }
            if ((key === 39 || key === 68) && !goingLeft) { dx = 1; dy = 0; changingDirection = true; }
            if ((key === 40 || key === 83) && !goingUp) { dx = 0; dy = 1; changingDirection = true; }
        }

        document.addEventListener("keydown", changeDirection);
        window.addEventListener("keydown", function(e) {
            if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) { e.preventDefault(); }
        }, false);
    </script>
</body>
