    <script>
        // ==========================================
        // Google Authentication Logic (With LocalStorage)
        // ==========================================
        const CLIENT_ID = '80116814697-fmqidduq28ubj101ff5fnmcsk2oevt53.apps.googleusercontent.com'; // এখানে আপনার Client ID দিন

        window.onload = function () {
            loadHighScore();
            
            // চেক করা হচ্ছে লোকাল স্টোরেজে আগে থেকেই ইউজারের ডেটা আছে কিনা
            const savedUser = localStorage.getItem('snakeGameUser');
            
            if (savedUser) {
                // ইউজার লগইন করা থাকলে সরাসরি গেম স্ক্রিন দেখাবে
                const userData = JSON.parse(savedUser);
                showGameScreen(userData, false);
            } else {
                // ইউজার লগইন করা না থাকলে গুগল বাটন ইনিশিয়ালাইজ করবে
                google.accounts.id.initialize({
                    client_id: CLIENT_ID,
                    callback: handleCredentialResponse
                });
                
                google.accounts.id.renderButton(
                    document.getElementById("buttonDiv"),
                    { 
                        theme: "filled_black", 
                        size: "large", 
                        shape: "pill", 
                        width: "280",
                        logo_alignment: "left"
                    } 
                );
            }
        };

        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const responsePayload = decodeJwtResponse(response.credential);

            let picUrl = responsePayload.picture;
            if(picUrl.includes('=s96-c')) {
                picUrl = picUrl.replace('=s96-c', '=s400-c');
            }

            const userData = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: picUrl
            };

            // লগইন সফল হলে ডেটা লোকাল স্টোরেজে সেভ করা হচ্ছে
            localStorage.setItem('snakeGameUser', JSON.stringify(userData));

            // গেম স্ক্রিন দেখানো হচ্ছে
            showGameScreen(userData, true);
        }

        function showGameScreen(userData, animate) {
            document.getElementById('user-name').textContent = userData.name;
            document.getElementById('user-email').textContent = userData.email;
            document.getElementById('user-pic').src = userData.picture;

            const loginSec = document.getElementById('login-section');
            const gameSec = document.getElementById('game-section');

            if (animate) {
                loginSec.style.opacity = '0';
                loginSec.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    loginSec.classList.add('hidden');
                    gameSec.classList.remove('hidden');
                    gameSec.classList.add('flex');
                    
                    gameSec.style.opacity = '0';
                    setTimeout(() => {
                        gameSec.style.transition = 'opacity 0.5s ease';
                        gameSec.style.opacity = '1';
                    }, 50);

                    resetGame();
                }, 300);
            } else {
                loginSec.classList.add('hidden');
                gameSec.classList.remove('hidden');
                gameSec.classList.add('flex');
                gameSec.style.opacity = '1';
                resetGame();
            }
        }

        function signOut() {
            localStorage.removeItem('snakeGameUser');

            document.getElementById('game-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('flex');
            
            const loginSec = document.getElementById('login-section');
            loginSec.classList.remove('hidden');
            
            setTimeout(() => {
                loginSec.style.opacity = '1';
                loginSec.style.transform = 'scale(1)';
            }, 50);

            clearTimeout(gameLoopTimeout);
            location.reload();
        }

        // ==========================================
        // Premium Snake Game Logic
        // ==========================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');

        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = 0;
        let gameLoopTimeout;
        let changingDirection = false;
        let isGameOver = false;

        const gridSize = 20; 
        const tileCount = canvas.width / gridSize;

        function loadHighScore() {
            highScore = localStorage.getItem('snakePremiumHighScore') || 0;
            highScoreDisplay.textContent = highScore;
        }

        function saveHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakePremiumHighScore', highScore);
                highScoreDisplay.textContent = highScore;
                
                highScoreDisplay.classList.add('text-yellow-400');
                setTimeout(() => highScoreDisplay.classList.remove('text-yellow-400'), 1000);
            }
        }

        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreDisplay.textContent = score;
            isGameOver = false;
            
            gameOverScreen.classList.add('hidden');
            gameOverScreen.classList.remove('flex');
            
            spawnFood();
            clearTimeout(gameLoopTimeout);
            main();
        }

        function main() {
            if (hasGameEnded()) {
                isGameOver = true;
                finalScoreDisplay.textContent = score;
                saveHighScore();
                gameOverScreen.classList.remove('hidden');
                gameOverScreen.classList.add('flex');
                return;
            }

            changingDirection = false;
            gameLoopTimeout = setTimeout(function onTick() {
                clearCanvas();
                drawGrid();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 90); 
        }

        function clearCanvas() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            for(let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
        }

        CanvasRenderingContext2D.prototype.roundRect = CanvasRenderingContext2D.prototype.roundRect || function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.beginPath();
            this.moveTo(x+r, y);
            this.arcTo(x+w, y,   x+w, y+h, r);
            this.arcTo(x+w, y+h, x,   y+h, r);
            this.arcTo(x,   y+h, x,   y,   r);
            this.arcTo(x,   y,   x+w, y,   r);
            this.closePath();
            return this;
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                
                ctx.shadowBlur = isHead ? 20 : 5;
                ctx.shadowColor = '#00ff88';
                
                if (isHead) {
                    let grad = ctx.createLinearGradient(part.x * gridSize, part.y * gridSize, (part.x+1) * gridSize, (part.y+1) * gridSize);
                    grad.addColorStop(0, '#00ff88');
                    grad.addColorStop(1, '#00b8ff');
                    ctx.fillStyle = grad;
                } else {
                    ctx.fillStyle = `rgba(0, 255, 136, ${1 - (index/snake.length)*0.6})`; 
                }
                
                ctx.roundRect(
                    part.x * gridSize + 1.5, 
                    part.y * gridSize + 1.5, 
                    gridSize - 3, 
                    gridSize - 3, 
                    isHead ? 6 : 4
                );
                ctx.fill();
                
                ctx.shadowBlur = 0;
            });
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); 

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;
                
                scoreDisplay.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    scoreDisplay.style.transform = 'scale(1)';
                }, 150);

                spawnFood();
            } else {
                snake.pop(); 
            }
        }

        function drawFood() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f43f5e'; 
            
            let grad = ctx.createRadialGradient(
                food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, 2,
                food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2
            );
            grad.addColorStop(0, '#fda4af');
            grad.addColorStop(1, '#e11d48');
            
            ctx.fillStyle = grad;

            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2, 
                food.y * gridSize + gridSize/2, 
                gridSize/2 - 2, 
                0, 2 * Math.PI
            );
            ctx.fill();
            
            ctx.shadowBlur = 0; 
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x === food.x && part.y === food.y) spawnFood();
            });
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        function changeDirection(event) {
            if (changingDirection || isGameOver) return;
            
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;
            const W_KEY = 87;
            const A_KEY = 65;
            const S_KEY = 83;
            const D_KEY = 68;

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === LEFT_KEY || keyPressed === A_KEY) && !goingRight) {
                dx = -1; dy = 0; changingDirection = true;
            }
            if ((keyPressed === UP_KEY || keyPressed === W_KEY) && !goingDown) {
                dx = 0; dy = -1; changingDirection = true;
            }
            if ((keyPressed === RIGHT_KEY || keyPressed === D_KEY) && !goingLeft) {
                dx = 1; dy = 0; changingDirection = true;
            }
            if ((keyPressed === DOWN_KEY || keyPressed === S_KEY) && !goingUp) {
                dx = 0; dy = 1; changingDirection = true;
            }
        }

        document.addEventListener("keydown", changeDirection);
        window.addEventListener("keydown", function(e) {
            if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
        }, false);
    </script>
</body>
